<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Love Earth — Sustainability Starts Here</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js" defer></script>

    <style>
        :root {
            /* Greens extracted from the Love Earth logo */
            --green-dark: #007A4D;
            --green-mid: #00885A;
            --green-leaf: #4CAF50;
            --green-vibrant: #5BBF21;
            --green-lime: #8DC63F;
            --green-light: #B8E986;
            --green-pale: #E8F5E9;

            /* Neutrals */
            --white: #FFFFFF;
            --off-white: #FAFCFA;
            --grey-100: #F1F5F1;
            --grey-200: #E0E7E0;
            --grey-400: #9CA89C;
            --grey-600: #6B776B;
            --charcoal: #1A2E1A;
            --text-dark: #1A2E1A;
            --text-muted: #6B776B;

            /* Radii */
            --radius-lg: 32px;
            --radius-md: 24px;
            --radius-sm: 16px;
            --radius-xs: 12px;
            --radius-pill: 100px;

            /* Shadows */
            --shadow-subtle: 0 10px 40px -10px rgba(0, 122, 77, 0.08);
            --shadow-btn: 0 8px 24px rgba(91, 191, 33, 0.35);
        }

        /* ──────────────────────────────────────────────
           RESET & BASE
        ────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            background: var(--off-white);
        }

        /* ──────────────────────────────────────────────
           SPLIT-SCREEN LAYOUT
        ────────────────────────────────────────────── */
        .split-screen {
            display: flex;
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
            background: var(--off-white);
        }

        /* LEFT — Form Side */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            z-index: 2;
            background: radial-gradient(circle at 0% 0%, rgba(91, 191, 33, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 122, 77, 0.03) 0%, transparent 50%);
        }

        /* Ambient Orbs for depth */
        .ambient-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        .orb-1 {
            background: rgba(91, 191, 33, 0.1);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            background: rgba(0, 122, 77, 0.08);
            bottom: -200px;
            right: -200px;
        }

        .form-container {
            width: 100%;
            max-width: 460px;
            padding: 48px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            position: relative;
            opacity: 0;
            /* Animated by GSAP */
        }

        /* Glass highlight effect */
        .form-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, transparent 50%, rgba(255, 255, 255, 0.3) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* RIGHT — Visual Side */
        .visual-side {
            flex: 1.1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--green-dark) 0%, var(--green-mid) 25%, var(--green-leaf) 55%, var(--green-vibrant) 80%, var(--green-lime) 100%);
        }

        /* ──────────────────────────────────────────────
           LEFT SIDE — FORM ELEMENTS
        ────────────────────────────────────────────── */

        /* Brand / Logo */
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .brand-logo img {
            height: 42px;
            width: auto;
        }

        .brand-logo span {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--green-dark);
            letter-spacing: -0.04em;
        }

        /* Headings */
        .form-heading {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-heading h2 {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--charcoal);
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 12px;
        }

        .form-heading .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Nav Tabs */
        .nav-tabs {
            display: flex;
            background: rgba(0, 122, 77, 0.05);
            padding: 6px;
            border-radius: 20px;
            margin-bottom: 32px;
            gap: 4px;
            border: 1px solid rgba(0, 122, 77, 0.05);
        }

        .nav-tab {
            flex: 1;
            padding: 12px 0;
            border-radius: 16px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .nav-tab.active {
            background: var(--white);
            color: var(--green-dark);
            box-shadow: 0 4px 15px rgba(0, 122, 77, 0.1);
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: 1.5px solid rgba(0, 122, 77, 0.08);
            background: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--green-vibrant);
            background: var(--white);
            box-shadow: 0 10px 25px -5px rgba(91, 191, 33, 0.15);
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn-register {
            width: 100%;
            padding: 18px 28px;
            border: none;
            border-radius: 20px;
            background: var(--charcoal);
            color: var(--white);
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn-register:hover {
            background: #000;
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .btn-register.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .btn-register .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        .btn-register:hover .icon-box {
            transform: translateX(4px);
        }

        /* Error Message */
        .error-msg {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
            border-radius: var(--radius-xs);
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            align-items: center;
            gap: 8px;
        }

        /* Footer */
        .form-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-footer a {
            color: var(--green-vibrant);
            font-weight: 800;
            text-decoration: none;
            position: relative;
        }

        .form-footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--green-vibrant);
            transform: scaleX(0.3);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .form-footer a:hover::after {
            transform: scaleX(1);
        }

        /* ──────────────────────────────────────────────
           RIGHT SIDE — VISUAL PANEL
        ────────────────────────────────────────────── */
        .visual-side::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(255, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
        }

        .visual-card {
            position: relative;
            z-index: 1;
            width: 320px;
            height: 320px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.15);
        }

        .visual-card p {
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .leaf-float {
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50% 10% 50% 10%;
            pointer-events: none;
        }

        /* ──────────────────────────────────────────────
           ANIMATIONS
        ────────────────────────────────────────────── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatSlow {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-12px) rotate(4deg);
            }
        }

        @keyframes floatCard {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .visual-side {
                display: none;
            }

            .form-side {
                padding: 40px 20px;
            }
        }

        .form-container>* {
            opacity: 0;
        }
    </style>
</head>

<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <div class="split-screen">
        <div class="form-side">
            <!-- Orbs for lighting -->
            <div class="ambient-orb orb-1"></div>
            <div class="ambient-orb orb-2"></div>

            <div class="form-container">
                <!-- Brand -->
                <div class="brand-logo">
                    <img src="public/loveearth_logo-removebg-preview.png" alt="Love Earth Logo">
                    <span>Love Earth</span>
                </div>

                <!-- Headings -->
                <div class="form-heading">
                    <h2>Join the mission</h2>
                    <p class="subtitle">Securely set up your sustainable dashboard</p>
                </div>

                <div class="nav-tabs">
                    <button class="nav-tab active" id="tab-employee" onclick="switchTab('employee')">Employee</button>
                    <button class="nav-tab" id="tab-hr" onclick="switchTab('hr')">HR Admin</button>
                </div>

                <div id="error-msg" class="error-msg"></div>

                <!-- Employee / Client Form -->
                <div id="form-employee" class="tab-content active">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input id="emp-name" class="form-input" type="text" placeholder="Alice Wonderland">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input id="emp-email" class="form-input" type="email" placeholder="alice@company.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input id="emp-password" class="form-input" type="password" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Preferred Start</label>
                        <input id="emp-date" class="form-input" type="date">
                    </div>
                    <button id="btn-employee" class="btn-register" onclick="handleRegister('employee')">
                        <span>Register Account</span>
                        <div class="icon-box"><i class="ph-bold ph-arrow-right"></i></div>
                    </button>
                </div>

                <!-- HR Form -->
                <div id="form-hr" class="tab-content">
                    <div class="form-group">
                        <label class="form-label">Admin Name</label>
                        <input id="hr-name" class="form-input" type="text" placeholder="Ivy Adams">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Official Email</label>
                        <input id="hr-email" class="form-input" type="email" placeholder="ivy@company.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Security Key</label>
                        <input id="hr-password" class="form-input" type="password" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Access Code</label>
                        <input id="hr-code" class="form-input" type="password" placeholder="Auth Code">
                        <small
                            style="color:var(--text-muted);display:block;margin-top:6px;font-size:0.75rem;opacity:0.7">Hint:
                            HR2026</small>
                    </div>
                    <button id="btn-hr" class="btn-register" onclick="handleRegister('hr')">
                        <span>Register as HR</span>
                        <div class="icon-box"><i class="ph-bold ph-shield-check"></i></div>
                    </button>
                </div>

                <p class="form-footer">Already have an account? <a href="index.html">Sign In</a></p>
            </div>
        </div>

        <div class="visual-side">
            <div class="leaf-float" style="top: 10%; right: 10%; width: 200px; height: 200px;"></div>
            <div class="leaf-float" style="bottom: 5%; left: 5%; width: 150px; height: 150px;"></div>

            <div class="visual-card">
                <div
                    style="background: rgba(255,255,255,0.2); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <i class="ph-fill ph-leaf" style="font-size: 3rem; color: white;"></i>
                </div>
                <p>Rooted in Future</p>
                <div style="width: 60%; height: 2px; background: rgba(255,255,255,0.2); border-radius: 1px;"></div>
            </div>
        </div>
    </div>

    <script>
        // GSAP Entrance Animations
        window.addEventListener('load', () => {
            const tl = gsap.timeline({ defaults: { ease: 'expo.out' } });

            tl.to('.form-container', {
                opacity: 1,
                y: 0,
                duration: 1.2,
                clearProps: 'transform'
            })
                .to('.form-container > *', {
                    opacity: 1,
                    y: 0,
                    stagger: 0.08,
                    duration: 1,
                }, '-=0.6')
                .from('.ambient-orb', {
                    scale: 0.5,
                    opacity: 0,
                    duration: 2,
                    stagger: 0.2
                }, 0)
                .from('.visual-card', {
                    opacity: 0,
                    scale: 0.8,
                    duration: 1.5
                }, 0.2)
                .from('.leaf-float', {
                    opacity: 0,
                    y: 100,
                    rotate: 20,
                    stagger: 0.3,
                    duration: 2
                }, 0.5);

            // Floating movement for visual elements
            gsap.to('.visual-card', {
                y: -20,
                duration: 3,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });

            gsap.to('.leaf-float', {
                y: 30,
                rotate: 5,
                duration: 4,
                repeat: -1,
                yoyo: true,
                stagger: 0.5,
                ease: 'sine.inOut'
            });

            // Mouse parallax effect
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 40;
                const y = (e.clientY / window.innerHeight - 0.5) * 40;

                gsap.to('.visual-card', { x: x * 0.5, y: y * 0.5, duration: 1, ease: 'power2.out' });
                gsap.to('.leaf-float', {
                    x: (i) => x * (0.8 + i * 0.2),
                    y: (i) => y * (0.8 + i * 0.2),
                    duration: 1.5,
                    ease: 'power2.out'
                });
            });
        });

        function switchTab(tab) {
            document.getElementById('tab-employee').classList.toggle('active', tab === 'employee');
            document.getElementById('tab-hr').classList.toggle('active', tab === 'hr');
            document.getElementById('form-employee').classList.toggle('active', tab === 'employee');
            document.getElementById('form-hr').classList.toggle('active', tab === 'hr');
            document.getElementById('error-msg').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.innerHTML = `<i class="ph-fill ph-warning-circle"></i> ${msg}`;
            el.style.display = 'block';
        }

        async function handleRegister(role) {
            const prefix = role === 'hr' ? 'hr' : 'emp';
            const name = document.getElementById(`${prefix}-name`).value.trim();
            const email = document.getElementById(`${prefix}-email`).value.trim().toLowerCase();
            const password = document.getElementById(`${prefix}-password`).value;
            const btn = document.getElementById(`btn-${role}`);
            const errorEl = document.getElementById('error-msg');

            errorEl.style.display = 'none';

            if (!name || !email || !password) {
                showError('Please fill in all required fields.');
                return;
            }

            let startDate = new Date().toISOString().split('T')[0];
            if (role === 'employee') {
                startDate = document.getElementById('emp-date').value;
                if (!startDate) {
                    showError('Please select a start date.');
                    return;
                }
            } else if (role === 'hr') {
                const code = document.getElementById('hr-code').value;
                if (code !== 'HR2026') {
                    showError('Invalid HR Access Code.');
                    return;
                }
            }

            btn.classList.add('loading');
            const originalText = btn.querySelector('span').textContent;
            btn.querySelector('span').textContent = 'Creating account...';

            try {
                // 1. Sign up with Supabase Auth
                const { data: authData, error: authError } = await db.auth.signUp({
                    email,
                    password
                });

                if (authError) throw authError;

                if (!authData.user) {
                    throw new Error('Could not create user account.');
                }

                // 2. Insert into public.employees table linking auth.uid()
                const { error: dbError } = await db.from('employees').insert([
                    {
                        auth_uid: authData.user.id,
                        name: name,
                        email: email,
                        role: role,
                        start_date: startDate
                    }
                ]);

                if (dbError) {
                    // Note: In production we'd want to handle cleanup of auth.user
                    console.error('DB Insert Error:', dbError);
                    throw new Error('Account created but failed to link profile. Email may already be in use.');
                }

                alert('Registration successful! You may now log in.');
                window.location.href = 'index.html';

            } catch (err) {
                console.error(err);
                btn.classList.remove('loading');
                btn.querySelector('span').textContent = originalText;
                showError(err.message || 'An error occurred during registration.');
            }
        }
    </script>
</body>

</html>
