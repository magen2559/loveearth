<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Onboarding — OnboardPro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js" defer></script>
    <style>
        .page-content {
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            border-radius: var(--radius-lg);
            padding: 32px;
            color: white;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '🚀';
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4rem;
            opacity: 0.3;
        }

        .welcome-banner h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .welcome-banner p {
            opacity: 0.85;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .progress-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .progress-info .pct {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .progress-info .label {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .progress-wrap-light {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 100px;
            height: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar-light {
            height: 100%;
            border-radius: 100px;
            background: white;
            transition: width 0.5s cubic-bezier(.4, 0, .2, 1);
        }

        /* Task Cards */
        .tasks-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .task-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        .task-card.completed {
            border-color: var(--success);
            background: #F0FDF4;
        }

        .task-num {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-2);
            flex-shrink: 0;
        }

        .task-card.completed .task-num {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .task-meta {
            font-size: 0.82rem;
            color: var(--text-2);
        }

        .task-card.completed .task-title {
            color: var(--success);
        }

        .task-arrow {
            color: var(--text-3);
            font-size: 1.1rem;
        }

        /* Modal Content Styles */
        .asset-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .asset-row {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
        }

        .asset-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .asset-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .na-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-2);
            cursor: pointer;
        }

        .na-toggle input {
            cursor: pointer;
        }

        .info-box {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            font-size: 0.92rem;
            line-height: 1.7;
            white-space: pre-line;
            max-height: 300px;
            overflow-y: auto;
        }

        .info-box h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .floor-plan {
            background: var(--surface-2);
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 40px;
            text-align: center;
            color: var(--text-2);
            margin-bottom: 16px;
        }

        .floor-plan-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .completed-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--success-light);
            border: 1px solid #6EE7B7;
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            color: #065F46;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="app-header">
        <a href="index.html" class="app-logo">
            <div class="logo-icon">🚀</div>
            OnboardPro
        </a>
        <div class="header-right">
            <div class="user-badge">
                <div class="user-avatar" id="header-avatar">?</div>
                <span id="header-name">Loading...</span>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
        </div>
    </header>

    <!-- Main -->
    <main class="page-content" id="main-content">
        <div class="loading-center">
            <div class="spinner"></div><span>Loading your tasks...</span>
        </div>
    </main>

    <!-- Task Modal -->
    <div class="modal-overlay" id="task-modal" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <p style="font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-2);margin-bottom:4px"
                        id="modal-task-num"></p>
                    <h2 class="modal-title" id="modal-title"></h2>
                </div>
                <button class="modal-close" onclick="closeModalDirect()">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const ASSETS = ['Laptop', 'Lanyard', 'Pass/Tag', 'Name Pin', 'Uniform', 'Handphone'];
        let currentEmployee = null;
        let allTasks = [];
        let employeeTasks = {};
        let assetData = {};
        let currentTaskId = null;

        async function init() {
            currentEmployee = getSession();
            if (!currentEmployee) { window.location.href = 'index.html'; return; }
            if (currentEmployee.role === 'hr') { window.location.href = 'admin.html'; return; }

            // Set header
            document.getElementById('header-name').textContent = currentEmployee.name;
            document.getElementById('header-avatar').textContent = getInitials(currentEmployee.name);

            await loadData();
        }

        async function loadData() {
            // Load tasks
            const { data: tasks } = await db
                .from('onboarding_tasks')
                .select('*')
                .eq('is_active', true)
                .order('sort_order');
            allTasks = tasks || [];

            // Load employee task status
            const { data: empTasks } = await db
                .from('employee_tasks')
                .select('*')
                .eq('employee_id', currentEmployee.id);
            employeeTasks = {};
            (empTasks || []).forEach(t => { employeeTasks[t.task_id] = t; });

            // Load asset data
            const { data: assets } = await db
                .from('asset_records')
                .select('*')
                .eq('employee_id', currentEmployee.id);
            assetData = {};
            (assets || []).forEach(a => { assetData[a.asset_name] = a; });

            renderPage();
        }

        function renderPage() {
            const completed = allTasks.filter(t => employeeTasks[t.id]?.is_completed).length;
            const total = allTasks.length;
            const pct = total ? Math.round((completed / total) * 100) : 0;
            const startDate = formatDate(currentEmployee.start_date);

            document.getElementById('main-content').innerHTML = `
        <div class="welcome-banner">
          <h1>Welcome, ${currentEmployee.name}! 👋</h1>
          <p>Started: ${startDate} · Complete your onboarding within your first 7 days</p>
          <div class="progress-info">
            <span class="pct">${pct}%</span>
            <span class="label">${completed} of ${total} tasks complete</span>
          </div>
          <div class="progress-wrap-light" style="margin-top:12px">
            <div class="progress-bar-light" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="tasks-grid" id="tasks-grid">
          ${allTasks.map(task => renderTaskCard(task)).join('')}
        </div>
      `;
        }

        function renderTaskCard(task) {
            const status = employeeTasks[task.id];
            const done = status?.is_completed;
            const icon = getTaskIcon(task.task_type);
            const meta = done
                ? '✅ Completed ' + formatDateTime(status.completed_at)
                : 'Tap to begin this task';
            return `
        <div class="task-card ${done ? 'completed' : ''}" onclick="openTask(${task.id})">
          <div class="task-num">${done ? '✓' : task.sort_order}</div>
          <div class="task-info">
            <div class="task-title">${icon} ${task.title}</div>
            <div class="task-meta">${meta}</div>
          </div>
          <div class="task-arrow">›</div>
        </div>`;
        }

        function getTaskIcon(type) {
            const icons = {
                asset_collection: '📦', info_view: '📖',
                date_input: '🍽️', photo_upload: '🎯', text_input: '🛍️'
            };
            return icons[type] || '✅';
        }

        async function openTask(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;
            currentTaskId = taskId;
            const status = employeeTasks[taskId];
            const done = status?.is_completed;

            document.getElementById('modal-task-num').textContent = `Task ${task.sort_order}`;
            document.getElementById('modal-title').textContent = task.title;
            document.getElementById('modal-body').innerHTML = await buildModalBody(task, status, done);
            document.getElementById('task-modal').classList.add('active');
        }

        async function buildModalBody(task, status, done) {
            let html = `<p style="color:var(--text-2);font-size:0.9rem;margin-bottom:20px">${task.description}</p>`;

            if (done) {
                html += `<div class="completed-badge">✅ Completed on ${formatDateTime(status.completed_at)}</div>`;
            }

            if (task.task_type === 'asset_collection') {
                html += buildAssetForm(done);
            } else if (task.task_type === 'info_view') {
                html += buildInfoView(task);
                if (!done) {
                    html += `<div class="form-group" style="margin-top:16px">
            <label class="form-label">Optional Notes</label>
            <textarea class="form-textarea" id="task-notes" placeholder="Any notes...">${status?.notes || ''}</textarea>
          </div>`;
                }
            } else if (task.task_type === 'date_input') {
                html += `<div class="form-group">
          <label class="form-label">Date of Meal</label>
          <input class="form-input" type="date" id="task-date" value="${status?.notes || ''}" ${done ? 'disabled' : ''}>
        </div>`;
            } else if (task.task_type === 'text_input') {
                html += `<div class="form-group">
          <label class="form-label">Order ID / Reference Number</label>
          <input class="form-input" type="text" id="task-text" placeholder="e.g. ORD-2026-00123" value="${status?.notes || ''}" ${done ? 'disabled' : ''}>
        </div>`;
            } else if (task.task_type === 'photo_upload') {
                html += `<div class="form-group">
          <label class="form-label">Upload Goal Board Photo (Optional)</label>
          <input class="form-input" type="file" id="task-photo" accept="image/*" ${done ? 'disabled' : ''}>
        </div>
        <div class="form-group">
          <label class="form-label">Notes (Optional)</label>
          <textarea class="form-textarea" id="task-notes" placeholder="Describe your goals..." ${done ? 'disabled' : ''}>${status?.notes || ''}</textarea>
        </div>`;
            }

            if (!done) {
                html += `<div style="margin-top:24px;display:flex;gap:12px">
          <button class="btn btn-primary btn-lg" style="flex:1;justify-content:center" onclick="markComplete(${task.id}, '${task.task_type}')">
            Mark as Complete ✓
          </button>
          <button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
        </div>`;
            } else {
                html += `<button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:16px" onclick="closeModalDirect()">Close</button>`;
            }

            return html;
        }

        function buildAssetForm(done) {
            let html = '<div class="asset-list">';
            ASSETS.forEach(asset => {
                const rec = assetData[asset];
                const isNA = rec?.not_applicable;
                const code = rec?.asset_tag_code || '';
                html += `
          <div class="asset-row">
            <div class="asset-row-top">
              <span class="asset-name">📦 ${asset}</span>
              <label class="na-toggle">
                <input type="checkbox" id="na-${asset}" ${isNA ? 'checked' : ''} ${done ? 'disabled' : ''}
                  onchange="toggleNA('${asset}')"> Not Applicable
              </label>
            </div>
            <div id="tag-wrap-${asset}" style="${isNA ? 'display:none' : ''}">
              <input class="form-input" type="text" id="tag-${asset}"
                placeholder="Asset tag code (e.g. LT-2026-001)"
                value="${code}" ${done ? 'disabled' : ''}>
            </div>
          </div>`;
            });
            html += '</div>';
            return html;
        }

        function buildInfoView(task) {
            const contentMap = {
                'Company Structure & Department Info': `
<h3>🏢 Company Organisation Chart</h3>
<b>CEO:</b> John Smith
  └── <b>COO:</b> Mary Lee
      ├── HR Department (Head: Sarah HR)
      │   ├── Recruitment
      │   └── Employee Relations
      ├── Operations Department
      │   ├── Logistics
      │   └── Customer Service
      ├── Finance Department
      │   ├── Accounts
      │   └── Payroll
      └── Technology Department
          ├── Software Development
          └── IT Support

<b>Your direct reporting line:</b> Report to your department Head.
For HR matters, contact: hr@company.com`,
                'Company Policy & Employee Handbook': `
<h3>📋 Key Company Policies</h3>
<b>Working Hours:</b> Mon–Fri, 9:00 AM – 6:00 PM
<b>Dress Code:</b> Smart casual. Wear your uniform when on customer-facing duties.
<b>Leave Policy:</b> 14 days annual leave per year (pro-rated for new hires).
<b>Medical:</b> 14 days MC per year. Submit MC to HR within 24 hours.
<b>Expenses:</b> All claims must be submitted within 14 days with receipts.
<b>Code of Conduct:</b> Treat all colleagues with respect. Zero tolerance for harassment or discrimination.
<b>Confidentiality:</b> All company data and client information is strictly confidential.
<b>IT Security:</b> Do not share passwords. Lock your screen when leaving your desk.
<b>Social Media:</b> Do not post confidential company information on personal accounts.

By acknowledging this task, you confirm you have read and understood all policies.`,
                'Office Tour & Safety Induction': `
<h3>🗺️ Office Floor Plan</h3>
<b>Level 3 — Main Office:</b>
  [Reception] → [Open Workspace] → [Meeting Rooms A, B, C]
  [Pantry/Kitchen] → [Server Room] → [HR Office]
  [Director's Office] → [Conference Room] → [Prayer Room]

<b>🚨 Emergency Procedures:</b>
• Fire exits: Main stairs (East) & Emergency stairs (West)
• Muster point: Car park Level 1, Zone A
• Fire extinguishers: Near lifts on each floor
• First aid kit: Pantry area
• Emergency contacts: Building security: ext. 100 | HR: ext. 201

<b>⚠️ Safety Rules:</b>
• No smoking inside the building
• Do not block fire exits
• Report any hazards to your supervisor immediately`
            };

            const content = contentMap[task.title] || `<p>Content for this section has been configured by HR.</p>`;
            return `<div class="info-box">${content}</div>`;
        }

        function toggleNA(asset) {
            const checked = document.getElementById(`na-${asset}`).checked;
            document.getElementById(`tag-wrap-${asset}`).style.display = checked ? 'none' : '';
        }

        async function markComplete(taskId, taskType) {
            const task = allTasks.find(t => t.id === taskId);
            let notes = '';

            // Gather input based on type
            if (taskType === 'date_input') {
                notes = document.getElementById('task-date')?.value || '';
            } else if (taskType === 'text_input') {
                notes = document.getElementById('task-text')?.value || '';
                if (!notes) { showToast('Please enter your Order ID / reference number.', 'error'); return; }
            } else if (taskType === 'photo_upload') {
                notes = document.getElementById('task-notes')?.value || '';
            } else if (taskType === 'info_view') {
                notes = document.getElementById('task-notes')?.value || '';
            }

            // Handle assets
            if (taskType === 'asset_collection') {
                const upserts = ASSETS.map(asset => ({
                    employee_id: currentEmployee.id,
                    asset_name: asset,
                    asset_tag_code: document.getElementById(`tag-${asset}`)?.value || '',
                    not_applicable: document.getElementById(`na-${asset}`)?.checked || false
                }));
                await db.from('asset_records').upsert(upserts, { onConflict: 'employee_id,asset_name' });
            }

            // Upsert employee_tasks record
            const { error } = await db.from('employee_tasks').upsert({
                employee_id: currentEmployee.id,
                task_id: taskId,
                is_completed: true,
                completed_at: new Date().toISOString(),
                notes: notes
            }, { onConflict: 'employee_id,task_id' });

            if (error) {
                showToast('Something went wrong. Please try again.', 'error');
                return;
            }

            showToast('Task completed! Great job 🎉', 'success');
            closeModalDirect();
            await loadData();
        }

        function closeModal(event) {
            if (event.target === event.currentTarget) closeModalDirect();
        }
        function closeModalDirect() {
            document.getElementById('task-modal').classList.remove('active');
        }

        function logout() {
            clearSession();
            window.location.href = 'index.html';
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
